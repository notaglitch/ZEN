<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="../assets/imgs/icon.ico"
      type="image/x-icon"
    />
    <!-- Bootstrap icons cdn link -->

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <!-- Bootstrap cdn link -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <!-- Particle js -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"
      type="text/javascript"
    ></script>
    <link rel="stylesheet" href="../assets/vendor/texillate/animate.css" />
    <link rel="stylesheet" href="style.css" />
    <title>JARVIS</title>
  </head>
  <body>
    <div class="container">
      <section id="Oval" class="mb-4">
        <div class="row">
          <div class="col-md-1"></div>
          <div class="col-md-10">
            <div
              class="d-flex justify-content-center align-items-center"
              style="height: 80vh"
            >
              <canvas
                id="canvasOne"
                width="700"
                height="420"
                style="position: absolute"
              ></canvas>
              <div id="JarvisHood">
                <div class="square">
                  <span class="circle"></span>
                  <span class="circle"></span>
                  <span class="circle"></span>
                </div>
              </div>
            </div>
            <h5 class="text-light text-center text">Ask me anything</h5>
            <div class="col-md-12 mt-4 pt-4">
              <div class="text-center">
                <div class="d-flex" id="TextInput">
                  <input
                    type="text"
                    name="chatbox"
                    class="input-field"
                    id="chatbox"
                    placeholder="Type here..."
                  />
                  <button class="glow-on-hover" id="MicBtn">
                    <i class="bi bi-mic"></i>
                  </button>
                  <button class="glow-on-hover" id="ChatBtn">
                    <i class="bi bi-chat-dots"></i>
                  </button>
                  <button class="glow-on-hover" id="SettingsBtn">
                    <i class="bi bi-gear"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-1"></div>
        </div>
      </section>
    </div>

    <section class="mb-4" id="SiriWaves">
      <div class="container">
        <div class="row">
          <div class="col-md-12">
            <div
              class="d-flex justify-content-center align-items-center"
              style="height: 100vh"
            >
              <div class="">
                <p class="text-start text-light mb-4 siri-message">
                  Hello, I am J.A.R.V.I.S
                </p>
                <div id="siri-container"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Particle js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.2/jquery-ui.min.js"></script>
    <script src="script.js"></script>
    <!--  -->
    <!-- Siri waves -->
    <script src="https://unpkg.com/siriwave/dist/siriwave.umd.min.js"></script>
    <!-- Jquery -->
    <script src="../assets/vendor/texillate/jquery.fittext.js"></script>
    <script src="../assets/vendor/texillate/jquery.lettering.js"></script>
    <script src="https://jschr.github.io/textillate/jquery.textillate.js"></script>

    <script src="main.js"></script>
    <script src="/eel.js"></script>
    <script src="controller.js"></script>
  </body>
</html>
